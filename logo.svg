<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Briefing">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff6ee"/><stop offset="1" stop-color="#ffe7d6"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7c47"/><stop offset="1" stop-color="#e8420f"/>
    </linearGradient>
  </defs>
  <!-- App-icon (squircle) dawn sky -->
  <rect width="512" height="512" rx="116" fill="url(#sky)"/>
  <!-- Rising sun: a bold dome above a horizon — minimal, reads at favicon size -->
  <path d="M136 322 a120 120 0 0 1 240 0 Z" fill="url(#sun)"/>
  <rect x="120" y="340" width="272" height="16" rx="8" fill="url(#sun)"/>
</svg>
